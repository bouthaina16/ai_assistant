spring.application.name=ai_assistant

# Server configuration
server.port=8010

# PostgreSQL datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/stok
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false
spring.jpa.packages-to-scan=com.stock.ai.stockmovement.entity

# SQL initialization (optional)
spring.sql.init.mode=never

# -----------------------------------------------------------------------------
# Stock backend integration (stok-master)
# -----------------------------------------------------------------------------
integration.stock.base-url=http://localhost:8011/api/stok
integration.stock.login=stockroot
integration.stock.password=Root@123
integration.stock.connect-timeout-millis=5000
integration.stock.response-timeout-millis=10000
integration.stock.request-timeout-millis=15000
integration.stock.token-refresh-skew-seconds=60
integration.stock.auth-ttl-fallback-seconds=3000
integration.stock.default-page-size=500

# Endpoint override (optional)
integration.stock.endpoints.auth-login=/auth/login
integration.stock.endpoints.product-search=/product/search
integration.stock.endpoints.client-search=/client/search
integration.stock.endpoints.invoice-search=/invoice/search
integration.stock.endpoints.station-search=/station/search
integration.stock.endpoints.transformation-search=/transformation/search
integration.stock.endpoints.movement-search=/product-movement/search
